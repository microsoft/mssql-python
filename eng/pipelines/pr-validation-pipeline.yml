# TEMPORARY: Stripped to only SQL Server 2016 repro for issue #600
name: pr-validation-pipeline

trigger:
  branches:
    include:
      - main

jobs:
- job: pytestonwindows
  displayName: 'Windows x64 - SQL 2016 repro (#600)'
  pool:
    vmImage: 'windows-latest'

  strategy:
    matrix:
      SQLServer2016:
        sqlVersion: 'SQL2016'
        pythonVersion: '3.12'

  steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '$(pythonVersion)'
      addToPath: true
      githubToken: $(GITHUB_TOKEN)
    displayName: 'Use Python $(pythonVersion)'

  - script: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
    displayName: 'Install dependencies'

  # Build the C++ pybind extension
  - script: |
      cd mssql_python\pybind
      build.bat x64
    displayName: 'Build .pyd file'

  # Install mssql_py_core from NuGet wheels
  - template: steps/install-mssql-py-core.yml
    parameters:
      platform: windows

  # Install SQL Server 2016 SP3 Express
  - powershell: |
      Write-Host "=== Installing SQL Server 2016 SP3 Express ==="
      $ProgressPreference = 'SilentlyContinue'

      # SQLEXPR_x64_ENU.exe is a self-contained installer — run it directly
      $installerUrl = "https://download.microsoft.com/download/9/0/7/907AD35F-9F9C-43A5-9789-52470555DB90/ENU/SQLEXPR_x64_ENU.exe"
      Write-Host "Downloading from $installerUrl ..."
      Invoke-WebRequest -Uri $installerUrl -OutFile "$env:TEMP\SQLEXPR_x64_ENU.exe"

      Write-Host "Running SQL Server 2016 Express setup directly..."
      $args = @(
        "/Q",
        "/ACTION=Install",
        "/FEATURES=SQLEngine",
        "/INSTANCENAME=MSSQLSERVER",
        "/SQLSVCACCOUNT=`"NT AUTHORITY\SYSTEM`"",
        "/SQLSYSADMINACCOUNTS=`"BUILTIN\Administrators`"",
        "/TCPENABLED=1",
        "/SECURITYMODE=SQL",
        "/SAPWD=$(DB_PASSWORD)",
        "/IACCEPTSQLSERVERLICENSETERMS",
        "/UPDATEENABLED=0"
      )
      Write-Host "Args: $($args -join ' ')"
      $proc = Start-Process -FilePath "$env:TEMP\SQLEXPR_x64_ENU.exe" -ArgumentList $args -Wait -PassThru
      Write-Host "Setup exit code: $($proc.ExitCode)"

      # Check summary log regardless of exit code
      $summaryLog = Get-ChildItem -Path "$env:ProgramFiles\Microsoft SQL Server\*\Setup Bootstrap\Log" -Filter "Summary.txt" -Recurse -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
      if ($summaryLog) {
        Write-Host "=== Setup Summary Log ==="
        Get-Content $summaryLog.FullName | Select-Object -Last 40
      }

      if ($proc.ExitCode -ne 0) {
        # Also check detail log
        $detailLog = Get-ChildItem -Path "$env:ProgramFiles\Microsoft SQL Server\*\Setup Bootstrap\Log" -Filter "Detail.txt" -Recurse -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
        if ($detailLog) {
          Write-Host "=== Setup Detail Log (last 60 lines) ==="
          Get-Content $detailLog.FullName | Select-Object -Last 60
        }
        Write-Error "SQL Server 2016 setup failed with exit code $($proc.ExitCode)"
        exit 1
      }

      # Verify service exists
      Get-Service -Name "MSSQL*" -ErrorAction SilentlyContinue | Format-Table Name, Status, StartType
      Write-Host "SQL Server 2016 installation completed"
    displayName: 'Install SQL Server 2016 SP3 Express'
    env:
      DB_PASSWORD: $(DB_PASSWORD)

  # Wait for SQL Server to start and set up database
  - powershell: |
      # Check install summary log for errors
      $summaryLog = Get-ChildItem -Path "$env:TEMP\SQL2016Setup" -Filter "Summary*.txt" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
      if ($summaryLog) {
        Write-Host "=== Install summary log ==="
        Get-Content $summaryLog.FullName | Select-Object -Last 30
      }

      # Check if SQL Server service exists and start it
      Write-Host "=== SQL Server services ==="
      Get-Service -Name "MSSQL*" -ErrorAction SilentlyContinue | Format-Table Name, Status, StartType
      Get-Service -Name "SQL*" -ErrorAction SilentlyContinue | Format-Table Name, Status, StartType

      # Force start the service
      $svc = Get-Service -Name "MSSQLSERVER" -ErrorAction SilentlyContinue
      if ($svc) {
        if ($svc.Status -ne 'Running') {
          Write-Host "Starting MSSQLSERVER service..."
          Start-Service -Name "MSSQLSERVER"
          Start-Sleep -Seconds 5
        }
        Write-Host "MSSQLSERVER status: $((Get-Service MSSQLSERVER).Status)"
      } else {
        Write-Host "MSSQLSERVER service not found, checking for named instances..."
        Get-Service | Where-Object { $_.Name -like '*SQL*' } | Format-Table Name, Status
      }

      # Enable TCP/IP via registry (SQL 2016 sometimes ignores /TCPENABLED=1)
      $regPath = "HKLM:\SOFTWARE\Microsoft\Microsoft SQL Server\MSSQL13.MSSQLSERVER\MSSQLServer\SuperSocketNetLib\Tcp"
      if (Test-Path $regPath) {
        Set-ItemProperty -Path $regPath -Name "Enabled" -Value 1
        Write-Host "TCP/IP enabled via registry"
        # Restart to pick up TCP change
        Restart-Service -Name "MSSQLSERVER" -Force
        Start-Sleep -Seconds 5
      } else {
        Write-Host "TCP registry path not found at: $regPath"
        # Try to find the actual path
        Get-ChildItem "HKLM:\SOFTWARE\Microsoft\Microsoft SQL Server\" -ErrorAction SilentlyContinue | Select-Object -First 10
      }

      # Now try to connect
      $maxAttempts = 30
      $attempt = 0
      $connected = $false

      Write-Host "Waiting for SQL Server 2016 to accept connections..."
      while (-not $connected -and $attempt -lt $maxAttempts) {
        try {
          $result = sqlcmd -S "localhost" -U "sa" -P "$(DB_PASSWORD)" -Q "SELECT 1" -C 2>&1
          if ($LASTEXITCODE -eq 0) {
            $connected = $true
            Write-Host "SQL Server 2016 is ready!"
          } else {
            Write-Host "sqlcmd exit code: $LASTEXITCODE"
          }
        } catch {
          Write-Host "Exception: $_"
        }
        if (-not $connected) {
          $attempt++
          Write-Host "Waiting... ($attempt/$maxAttempts)"
          Start-Sleep -Seconds 2
        }
      }

      if (-not $connected) {
        # Dump error log for diagnosis
        Write-Host "=== SQL Server Error Log ==="
        $errorLog = "C:\Program Files\Microsoft SQL Server\MSSQL13.MSSQLSERVER\MSSQL\Log\ERRORLOG"
        if (Test-Path $errorLog) {
          Get-Content $errorLog | Select-Object -Last 50
        } else {
          Write-Host "Error log not found at $errorLog"
          Get-ChildItem "C:\Program Files\Microsoft SQL Server\" -Recurse -Filter "ERRORLOG" -ErrorAction SilentlyContinue | Select-Object FullName
        }
        Write-Error "Failed to connect to SQL Server 2016"
        exit 1
      }

      sqlcmd -S "localhost" -U "sa" -P "$(DB_PASSWORD)" -Q "SELECT @@VERSION" -C

      sqlcmd -S "localhost" -U "sa" -P "$(DB_PASSWORD)" -C -Q "CREATE DATABASE TestDB"
      sqlcmd -S "localhost" -U "sa" -P "$(DB_PASSWORD)" -C -Q "CREATE LOGIN testuser WITH PASSWORD = '$(DB_PASSWORD)'"
      sqlcmd -S "localhost" -U "sa" -P "$(DB_PASSWORD)" -C -d TestDB -Q "CREATE USER testuser FOR LOGIN testuser"
      sqlcmd -S "localhost" -U "sa" -P "$(DB_PASSWORD)" -C -d TestDB -Q "ALTER ROLE db_owner ADD MEMBER testuser"
    displayName: 'Setup SQL Server 2016 database'
    env:
      DB_PASSWORD: $(DB_PASSWORD)

  # Run the bulkcopy repro with full Rust TDS tracing
  - script: |
      pip install -e .
      set MSSQL_TDS_TRACE=true
      set MSSQL_TDS_TRACE_LEVEL=debug
      python tests/gh600_bulkcopy_repro.py
    displayName: 'Run bulkcopy repro (with TDS trace)'
    env:
      DB_CONNECTION_STRING: 'Server=localhost;Database=TestDB;Uid=testuser;Pwd=$(DB_PASSWORD);TrustServerCertificate=yes'

  # Upload trace logs as artifact
  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: 'mssql_python_logs'
      artifact: 'tds-trace-logs-sql2016'
    condition: always()
    displayName: 'Upload TDS trace logs'
