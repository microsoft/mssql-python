# TEMPORARY: Stripped to only SQL Server 2016 repro for issue #600
name: pr-validation-pipeline

trigger:
  branches:
    include:
      - main

jobs:
- job: pytestonwindows
  displayName: 'Windows x64 - SQL 2016 repro (#600)'
  pool:
    vmImage: 'windows-latest'

  strategy:
    matrix:
      SQLServer2016:
        sqlVersion: 'SQL2016'
        pythonVersion: '3.12'

  steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '$(pythonVersion)'
      addToPath: true
      githubToken: $(GITHUB_TOKEN)
    displayName: 'Use Python $(pythonVersion)'

  - script: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
    displayName: 'Install dependencies'

  # Build the C++ pybind extension
  - script: |
      cd mssql_python\pybind
      build.bat x64
    displayName: 'Build .pyd file'

  # Install mssql_py_core from NuGet wheels
  - template: steps/install-mssql-py-core.yml
    parameters:
      platform: windows

  # Install SQL Server 2016 SP3 Express
  - powershell: |
      Write-Host "=== Installing SQL Server 2016 SP3 Express ==="
      $ProgressPreference = 'SilentlyContinue'

      $installerUrl = "https://download.microsoft.com/download/9/0/7/907AD35F-9F9C-43A5-9789-52470555DB90/ENU/SQLEXPR_x64_ENU.exe"
      Write-Host "Downloading from $installerUrl ..."
      Invoke-WebRequest -Uri $installerUrl -OutFile "$env:TEMP\SQLEXPR_x64_ENU.exe"

      Write-Host "Extracting..."
      Start-Process -FilePath "$env:TEMP\SQLEXPR_x64_ENU.exe" -ArgumentList "/x:$env:TEMP\SQL2016Setup","/u" -Wait

      Write-Host "Running SQL Server 2016 setup..."
      Start-Process -FilePath "$env:TEMP\SQL2016Setup\setup.exe" -ArgumentList `
        "/Q", `
        "/ACTION=Install", `
        "/FEATURES=SQLEngine", `
        "/INSTANCENAME=MSSQLSERVER", `
        "/SQLSVCACCOUNT=`"NT AUTHORITY\SYSTEM`"", `
        "/SQLSYSADMINACCOUNTS=`"BUILTIN\Administrators`"", `
        "/TCPENABLED=1", `
        "/SECURITYMODE=SQL", `
        "/SAPWD=$(DB_PASSWORD)", `
        "/IACCEPTSQLSERVERLICENSETERMS" `
        -Wait

      Write-Host "SQL Server 2016 installation completed"
    displayName: 'Install SQL Server 2016 SP3 Express'
    env:
      DB_PASSWORD: $(DB_PASSWORD)

  # Wait for SQL Server to start and set up database
  - powershell: |
      $maxAttempts = 30
      $attempt = 0
      $connected = $false

      Write-Host "Waiting for SQL Server 2016 to start..."
      while (-not $connected -and $attempt -lt $maxAttempts) {
        try {
          $result = sqlcmd -S "localhost" -U "sa" -P "$(DB_PASSWORD)" -Q "SELECT 1" -C 2>&1
          if ($LASTEXITCODE -eq 0) {
            $connected = $true
            Write-Host "SQL Server 2016 is ready!"
          }
        } catch { }
        if (-not $connected) {
          $attempt++
          Write-Host "Waiting... ($attempt/$maxAttempts)"
          Start-Sleep -Seconds 2
        }
      }

      if (-not $connected) {
        Write-Error "Failed to connect to SQL Server 2016"
        exit 1
      }

      sqlcmd -S "localhost" -U "sa" -P "$(DB_PASSWORD)" -Q "SELECT @@VERSION" -C

      sqlcmd -S "localhost" -U "sa" -P "$(DB_PASSWORD)" -C -Q "CREATE DATABASE TestDB"
      sqlcmd -S "localhost" -U "sa" -P "$(DB_PASSWORD)" -C -Q "CREATE LOGIN testuser WITH PASSWORD = '$(DB_PASSWORD)'"
      sqlcmd -S "localhost" -U "sa" -P "$(DB_PASSWORD)" -C -d TestDB -Q "CREATE USER testuser FOR LOGIN testuser"
      sqlcmd -S "localhost" -U "sa" -P "$(DB_PASSWORD)" -C -d TestDB -Q "ALTER ROLE db_owner ADD MEMBER testuser"
    displayName: 'Setup SQL Server 2016 database'
    env:
      DB_PASSWORD: $(DB_PASSWORD)

  # Run the bulkcopy repro with full Rust TDS tracing
  - script: |
      set MSSQL_TDS_TRACE=true
      set MSSQL_TDS_TRACE_LEVEL=debug
      python tests/gh600_bulkcopy_repro.py
    displayName: 'Run bulkcopy repro (with TDS trace)'
    env:
      DB_CONNECTION_STRING: 'Server=localhost;Database=TestDB;Uid=testuser;Pwd=$(DB_PASSWORD);TrustServerCertificate=yes'

  # Upload trace logs as artifact
  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: 'mssql_python_logs'
      artifact: 'tds-trace-logs-sql2016'
    condition: always()
    displayName: 'Upload TDS trace logs'
