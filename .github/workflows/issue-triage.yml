# Issue Triage Workflow

name: Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Run Triage
        run: |
          python triage_script.py

      - name: Call models service
        run: |
          curl -X POST -H 'Content-Type: application/json' -d '{"data": "input_data"}' 'https://models.github.ai/inference/chat/completions'
