name: Issue Notification

on:
  workflow_call:
    inputs:
      category:
        required: true
        type: string
      confidence:
        required: true
        type: string
      severity:
        required: true
        type: string
      justification:
        required: true
        type: string
      summary_for_maintainers:
        required: true
        type: string
      relevant_files:
        required: true
        type: string
      keywords:
        required: true
        type: string
      code_analysis:
        required: false
        type: string
        default: ''
      engineer_guidance:
        required: false
        type: string
        default: ''
      suggested_response:
        required: false
        type: string
        default: ''
      similar_issues:
        required: false
        type: string
        default: ''
      workaround:
        required: false
        type: string
        default: ''
      issue_number:
        required: true
        type: string
      issue_title:
        required: true
        type: string
      issue_url:
        required: true
        type: string
      issue_author:
        required: true
        type: string
    secrets:
      TEAMS_WEBHOOK_URL:
        required: true

permissions:
  contents: read

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Send Teams Channel notification
        env:
          INPUT_CATEGORY: ${{ inputs.category }}
          INPUT_SEVERITY: ${{ inputs.severity }}
          INPUT_CONFIDENCE: ${{ inputs.confidence }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
          INPUT_ISSUE_TITLE: ${{ inputs.issue_title }}
          INPUT_ISSUE_AUTHOR: ${{ inputs.issue_author }}
          INPUT_ISSUE_URL: ${{ inputs.issue_url }}
          INPUT_KEYWORDS: ${{ inputs.keywords }}
          INPUT_RELEVANT_FILES: ${{ inputs.relevant_files }}
          INPUT_SUMMARY: ${{ inputs.summary_for_maintainers }}
          INPUT_CODE_ANALYSIS: ${{ inputs.code_analysis }}
          INPUT_ENGINEER_GUIDANCE: ${{ inputs.engineer_guidance }}
          INPUT_SUGGESTED_RESPONSE: ${{ inputs.suggested_response }}
          INPUT_SIMILAR_ISSUES: ${{ inputs.similar_issues }}
          INPUT_WORKAROUND: ${{ inputs.workaround }}
          INPUT_JUSTIFICATION: ${{ inputs.justification }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          CATEGORY="$INPUT_CATEGORY"
          SEVERITY="$INPUT_SEVERITY"

          # Set emoji and action based on category
          case "$CATEGORY" in
            FEATURE_REQUEST)
              EMOJI="💡"
              CATEGORY_DISPLAY="Feature Request"
              ACTION="Evaluate against roadmap. If approved, create ADO work item."
              ;;
            BUG)
              EMOJI="🐛"
              CATEGORY_DISPLAY="Bug"
              ACTION="Validate bug, reproduce if possible, assign to developer."
              ;;
            DISCUSSION)
              EMOJI="💬"
              CATEGORY_DISPLAY="Discussion"
              ACTION="Respond with guidance. Re-classify if needed."
              ;;
            BREAK_FIX)
              EMOJI="🚨"
              CATEGORY_DISPLAY="Break/Fix (Regression)"
              ACTION="URGENT: Assign to senior dev, create P0/P1 ADO item."
              ;;
            *)
              EMOJI="❓"
              CATEGORY_DISPLAY="Unknown"
              ACTION="Review and manually classify this issue."
              ;;
          esac

          # Parse and format code analysis from JSON into readable text
          CODE_ANALYSIS_RAW="$INPUT_CODE_ANALYSIS"
          if [ -n "$CODE_ANALYSIS_RAW" ]; then
            # Try to parse as JSON and extract structured fields
            CODE_ANALYSIS=$(echo "$CODE_ANALYSIS_RAW" | jq -r '
              [
                (if .is_bug then "<b>Verdict:</b> " + (.is_bug | @html) else empty end),
                (if .root_cause then "<b>Root Cause:</b> " + (.root_cause | @html) else empty end),
                (if .affected_components and (.affected_components | length) > 0
                 then "<b>Affected Components:</b><br>" + ([.affected_components[] | "&nbsp;&nbsp;• " + (. | @html)] | join("<br>"))
                 else empty end),
                (if .evidence_and_context then "<b>Evidence &amp; Context:</b> " + (.evidence_and_context | @html) else empty end),
                (if .recommended_fixes and (.recommended_fixes | length) > 0
                 then "<b>Recommended Fixes:</b><br>" + ([.recommended_fixes | to_entries[] | "&nbsp;&nbsp;" + ((.key + 1) | tostring) + ". " + (.value | @html)] | join("<br>"))
                 else empty end),
                (if .code_locations and (.code_locations | length) > 0
                 then "<b>Code Locations:</b><br>" + ([.code_locations[] | "&nbsp;&nbsp;• " + (. | @html)] | join("<br>"))
                 else empty end),
                (if .risk_assessment then "<b>Risk Assessment:</b> " + (.risk_assessment | @html) else empty end)
              ] | join("<br><br>")
            ' 2>/dev/null || echo "$CODE_ANALYSIS_RAW" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          else
            CODE_ANALYSIS="N/A — classification did not require code analysis."
          fi

          # Parse and format engineer guidance from JSON into readable text
          ENGINEER_GUIDANCE_RAW="$INPUT_ENGINEER_GUIDANCE"
          if [ -n "$ENGINEER_GUIDANCE_RAW" ]; then
            ENGINEER_GUIDANCE=$(echo "$ENGINEER_GUIDANCE_RAW" | jq -r '
              [
                (if .technical_assessment then "<b>Technical Assessment:</b> " + (.technical_assessment | @html) else empty end),
                (if .verdict then "<b>Verdict:</b> " + (.verdict | @html) else empty end),
                (if .effort_estimate then "Effort Estimate: " + (.effort_estimate | @html) else empty end),
                (if .affected_files and (.affected_files | length) > 0
                 then "<b>Affected Files:</b><br>" + ([.affected_files[] | "&nbsp;&nbsp;• " + (. | @html)] | join("<br>"))
                 else empty end),
                (if .implementation_approach then "<b>Implementation Approach:</b> " + (.implementation_approach | @html) else empty end),
                (if .risks_and_tradeoffs then "<b>Risks &amp; Tradeoffs:</b> " + (.risks_and_tradeoffs | @html) else empty end),
                (if .related_considerations and (.related_considerations | length) > 0
                 then "<b>Related Considerations:</b><br>" + ([.related_considerations | to_entries[] | "&nbsp;&nbsp;" + ((.key + 1) | tostring) + ". " + (.value | @html)] | join("<br>"))
                 else empty end)
              ] | join("<br><br>")
            ' 2>/dev/null || echo "$ENGINEER_GUIDANCE_RAW" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          else
            ENGINEER_GUIDANCE=""
          fi

          # Format suggested customer response (Markdown -> HTML, preserving code blocks)
          SUGGESTED_RESPONSE_RAW="$INPUT_SUGGESTED_RESPONSE"
          if [ -n "$SUGGESTED_RESPONSE_RAW" ]; then
            SUGGESTED_RESPONSE=$(printf '%s' "$SUGGESTED_RESPONSE_RAW" | awk '
              function htmlesc(s) {
                gsub(/&/, "\\&amp;", s)
                gsub(/</, "\\&lt;", s)
                gsub(/>/, "\\&gt;", s)
                return s
              }
              BEGIN { in_code = 0 }
              {
                line = $0
                # Toggle on fenced code block markers (```), allow optional language
                if (line ~ /^[[:space:]]*```/) {
                  if (in_code == 0) { printf "<pre><code>"; in_code = 1 }
                  else              { printf "</code></pre>";  in_code = 0 }
                  next
                }
                if (in_code) {
                  # Inside a code block: HTML-escape and preserve newlines literally
                  printf "%s\n", htmlesc(line)
                } else {
                  esc = htmlesc(line)
                  # Convert inline `code` to <code>code</code>
                  out = ""
                  while (match(esc, /`[^`]+`/)) {
                    out = out substr(esc, 1, RSTART-1) "<code>" substr(esc, RSTART+1, RLENGTH-2) "</code>"
                    esc = substr(esc, RSTART+RLENGTH)
                  }
                  out = out esc
                  printf "%s<br>", out
                }
              }
              END { if (in_code) printf "</code></pre>" }
            ')
          else
            SUGGESTED_RESPONSE=""
          fi

          # Parse and format similar issues analysis
          SIMILAR_ISSUES_RAW="$INPUT_SIMILAR_ISSUES"
          if [ -n "$SIMILAR_ISSUES_RAW" ]; then
            SIMILAR_ISSUES=$(echo "$SIMILAR_ISSUES_RAW" | jq -r '
              [
                (if .summary then "<b>Summary:</b> " + (.summary | @html) else empty end),
                (if .duplicate_issues and (.duplicate_issues | length) > 0
                 then "<b>Similar/Duplicate Issues:</b><br>" + ([.duplicate_issues[] | select(.issue_number | tostring | test("^[0-9]+$")) | "&nbsp;&nbsp;• <a href=\"https://github.com/microsoft/mssql-python/issues/" + (.issue_number | tostring) + "\">#" + (.issue_number | tostring) + "</a> " + (.title | @html) + " [" + (.state | @html) + "] — <i>" + (.similarity | @html) + ":</i> " + (.explanation | @html)] | join("<br>"))
                 else empty end),
                (if .recently_fixed and (.recently_fixed | length) > 0
                 then "<b>Recently Fixed:</b><br>" + ([.recently_fixed[] | select(.issue_number | tostring | test("^[0-9]+$")) | "&nbsp;&nbsp;• <a href=\"https://github.com/microsoft/mssql-python/issues/" + (.issue_number | tostring) + "\">#" + (.issue_number | tostring) + "</a> " + (.title | @html) + " (closed " + (.closed_at | @html) + ") — " + (.relevance | @html)] | join("<br>"))
                 else empty end)
              ] | join("<br><br>")
            ' 2>/dev/null || echo "$SIMILAR_ISSUES_RAW" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          else
            SIMILAR_ISSUES=""
          fi

          # Parse and format workaround analysis
          WORKAROUND_RAW="$INPUT_WORKAROUND"
          if [ -n "$WORKAROUND_RAW" ]; then
            # Defensive: if the model emitted code_snippet as a single line (no real \n),
            # insert newlines before common Python statement keywords so the rendered <pre>
            # block shows readable, multi-line code.
            WORKAROUND_RAW=$(printf '%s' "$WORKAROUND_RAW" | jq -c '
              def fixcode(s):
                if (s | type) != "string" or (s | length) == 0 or (s | contains("\n")) then s
                else
                  s
                  | gsub("(?<kw>\\bfrom\\s+[\\w\\.]+\\s+import\\b|\\bimport\\s+[\\w\\.]+|\\bdef\\s|\\bclass\\s|\\btry:|\\bexcept\\b|\\bfinally:|\\belse:|\\belif\\s|\\bif\\s|\\bfor\\s|\\bwhile\\s|\\bwith\\s|\\breturn\\b|\\braise\\b)"; "\n\(.kw)")
                  | sub("^\n"; "")
                end;
              if (.workarounds | type) == "array"
              then .workarounds |= map(.code_snippet = fixcode(.code_snippet // ""))
              else . end
            ' 2>/dev/null || printf '%s' "$WORKAROUND_RAW")
            WORKAROUND=$(echo "$WORKAROUND_RAW" | jq -r '
              [
                (if .summary then "<b>Summary:</b> " + (.summary | @html) else empty end),
                (if .has_workaround and .workarounds and (.workarounds | length) > 0
                 then "<b>Workarounds:</b><br>" + ([.workarounds | to_entries[] | "&nbsp;&nbsp;" + ((.key + 1) | tostring) + ". <b>" + (.value.description | @html) + "</b> [" + (if (.value.confidence | tostring) == "high" or (.value.confidence | tostring) == "medium" or (.value.confidence | tostring) == "low" then (.value.confidence | tostring) else "unknown" end) + " confidence]<br>&nbsp;&nbsp;&nbsp;&nbsp;Limitations: " + (.value.limitations | @html) + (if .value.code_snippet and (.value.code_snippet | length) > 0 then "<br>&nbsp;&nbsp;&nbsp;&nbsp;Code:<pre style=\"background:#f6f8fa;border:1px solid #d0d7de;border-radius:6px;padding:8px;margin:4px 0;font-family:Consolas,monospace;white-space:pre-wrap;\"><code>" + (.value.code_snippet | @html | gsub("\t"; "    ") | gsub(" "; "&nbsp;") | gsub("\n"; "<br>")) + "</code></pre>" else "" end)] | join("<br>"))
                 else empty end),
                (if .can_downgrade == true and .downgrade_version
                 then "⬇️ <b>Safe to downgrade to:</b> " + (.downgrade_version | @html)
                 else empty end)
              ] | join("<br><br>")
            ' 2>/dev/null || echo "$WORKAROUND_RAW" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          else
            WORKAROUND=""
          fi

          # Set severity color indicator
          case "$SEVERITY" in
            critical) SEV_INDICATOR="🔴" ;;
            high)     SEV_INDICATOR="🟠" ;;
            medium)   SEV_INDICATOR="🟡" ;;
            *)        SEV_INDICATOR="🟢" ;;
          esac

          # Build well-formatted HTML message using jq for proper JSON escaping
          jq -n \
            --arg emoji "$EMOJI" \
            --arg category_display "$CATEGORY_DISPLAY" \
            --arg severity "$SEVERITY" \
            --arg sev_indicator "$SEV_INDICATOR" \
            --arg confidence "$INPUT_CONFIDENCE" \
            --arg issue_num "$INPUT_ISSUE_NUMBER" \
            --arg issue_title "$INPUT_ISSUE_TITLE" \
            --arg issue_author "$INPUT_ISSUE_AUTHOR" \
            --arg issue_url "$INPUT_ISSUE_URL" \
            --arg keywords "$INPUT_KEYWORDS" \
            --arg relevant_files "$INPUT_RELEVANT_FILES" \
            --arg summary "$INPUT_SUMMARY" \
            --arg code_analysis "$CODE_ANALYSIS" \
            --arg engineer_guidance "$ENGINEER_GUIDANCE" \
            --arg suggested_response "$SUGGESTED_RESPONSE" \
            --arg similar_issues "$SIMILAR_ISSUES" \
            --arg workaround "$WORKAROUND" \
            --arg justification "$INPUT_JUSTIFICATION" \
            --arg action "$ACTION" \
            --arg repo_url "https://github.com/microsoft/mssql-python" \
            '{
              "text": (
                "<h2>" + $emoji + " mssql-python Issue Triage</h2>" +
                "<p><b>" + $category_display + "</b> &nbsp;|&nbsp; " +
                $sev_indicator + " Severity: <b>" + $severity + "</b> &nbsp;|&nbsp; " +
                "Confidence: <b>" + $confidence + "%</b></p>" +
                "<hr>" +
                "<p>" +
                "📌 <b>Issue:</b> <a href=\"" + $issue_url + "\">#" + $issue_num + " — " + ($issue_title | @html) + "</a><br>" +
                "👤 <b>Author:</b> @" + ($issue_author | @html) + "<br>" +
                "🏷️ <b>Keywords:</b> " + ($keywords | @html) + "<br>" +
                "📂 <b>Relevant Files:</b> " + ($relevant_files | @html) + "<br>" +
                "💬 <b>Justification:</b> " + ($justification | @html) +
                "</p>" +
                "<hr>" +
                "<h3>📝 Analysis</h3>" +
                "<p>" + ($summary | @html) + "</p>" +
                "<h3>🔍 Code Analysis</h3>" +
                "<p>" + $code_analysis + "</p>" +
                (if $similar_issues != "" then
                  "<h3>🔄 Similar Issues &amp; Recent Fixes</h3>" +
                  "<p>" + $similar_issues + "</p>"
                else "" end) +
                (if $workaround != "" then
                  "<h3>🛠️ Workarounds</h3>" +
                  "<p>" + $workaround + "</p>"
                else "" end) +
                (if $engineer_guidance != "" then
                  "<h3>💡 Engineer Guidance</h3>" +
                  "<p>" + $engineer_guidance + "</p>"
                else "" end) +
                (if $suggested_response != "" then
                  "<hr>" +
                  "<h3>✉️ Suggested Response to Customer</h3>" +
                  "<p><i>Copy-paste or edit the response below and post it on the issue:</i></p>" +
                  "<blockquote>" + $suggested_response + "</blockquote>"
                else "" end) +
                "<hr>" +
                "<p>⚡ <b>Action Required:</b> " + $action + "</p>" +
                "<p><i>⚠️ AI-generated analysis — verified against source code but may contain inaccuracies. Review before acting.</i></p>" +
                "<p><a href=\"" + $issue_url + "\">📋 View Issue</a>" +
                " &nbsp;|&nbsp; " +
                "<a href=\"" + $repo_url + "\">📂 View Repository</a></p>"
              )
            }' > /tmp/teams_payload.json

          echo "Sending notification to Teams Channel..."

          HTTP_STATUS=$(curl -s -o /tmp/teams_response.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d @/tmp/teams_payload.json \
            "$TEAMS_WEBHOOK_URL")

          echo "Teams API response: $HTTP_STATUS"
          cat /tmp/teams_response.txt

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Failed to send Teams notification. HTTP status: $HTTP_STATUS"
            exit 1
          fi

          echo "✅ Teams Channel notification sent successfully"